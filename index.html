<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <style>\n        @media (max-width: 576px) {\n            /* Styles for extra small screens */\n            body {\n                font-size: 14px;\n            }\n        }\n        :root {\n            --transition-duration: 0.3s;\n        }\n        /* Improved grid responsiveness using auto-fit */\n        .grid-container {\n            display: grid;\n            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));\n            gap: 16px;\n        }\n        /* Animation transitions support */\n        .interactive-component {\n            transition: all var(--transition-duration);\n        }\n    </style>\n    <title>Your Title</title>\n</head>\n<body>\n    <noscript>This application requires JavaScript to function properly.</noscript>\n    <div class="grid-container">\n        <button aria-label="More info">Info</button>\n    </div>\n</body>\n</html>\n
